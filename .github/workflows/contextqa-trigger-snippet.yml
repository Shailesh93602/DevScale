name: ContextQA Test Execution Trigger

on:
  workflow_call:
    inputs:
      cqa_org_name:
        description: "ContextQA organization name"
        required: true
        type: string
      cqa_auth_token:
        description: "ContextQA authentication token"
        required: true
        type: string
      pr_number:
        description: "PR number to execute tests for"
        required: true
        type: string
      pr_branch:
        description: "PR branch name"
        required: true
        type: string
      merge_sha:
        description: "Merge commit SHA"
        required: true
        type: string

jobs:
  execute-contextqa-tests:
    uses: ./.github/workflows/contextqa-complete-workflow.yml
    with:
      cqa_org_name: ${{ inputs.cqa_org_name }}
      cqa_auth_token: ${{ inputs.cqa_auth_token }}
      pr_number: ${{ inputs.pr_number }}
      pr_branch: ${{ inputs.pr_branch }}
      merge_sha: ${{ inputs.merge_sha }}
