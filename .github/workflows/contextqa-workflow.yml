name: Reusable ContextQA Testing Workflow

on:
  workflow_call:
    inputs:
      cqa_api_url:
        description: "ContextQA API URL"
        required: true
        type: string
      cqa_api_secret:
        description: "ContextQA API Secret"
        required: true
        type: string
      cqa_project_title:
        description: "Project title for testing"
        required: false
        type: string
        default: ""
      cqa_deployment_url:
        description: "Deployment URL to test"
        required: false
        type: string
        default: ""
      cqa_agent_id:
        description: "Agent ID for testing"
        required: false
        type: string
        default: ""
      cqa_acceptance_rate:
        description: "Acceptance rate threshold"
        required: false
        type: string
        default: ""
      cqa_max_steps:
        description: "Maximum testing steps"
        required: false
        type: string
        default: ""
      cqa_timeout:
        description: "Testing timeout"
        required: false
        type: string
        default: ""
      cqa_test_focus:
        description: "Test focus area"
        required: false
        type: string
        default: ""
      cqa_email:
        description: "Email for results"
        required: false
        type: string
        default: ""

jobs:
  trigger-contextqa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: {}
    steps:
      - name: Trigger ContextQA Tests with Dynamic Configuration
        env:
          FLOW_URL: ${{ inputs.cqa_api_url }}
          FLOW_TOKEN: ${{ inputs.cqa_api_secret }}
        run: |
          set -euo pipefail
          if [ -z "${FLOW_URL:-}" ] || [ -z "${FLOW_TOKEN:-}" ]; then
            echo "Missing FLOW_URL or FLOW_TOKEN inputs"; exit 1
          fi

          echo "🚀 Triggering ContextQA automated tests with dynamic configuration..."

          # Send contextual info to start testing workflow
          RESPONSE=$(curl --fail -sS -X POST "$FLOW_URL/github/start-test" \
                  -H "Authorization: Bearer $FLOW_TOKEN" \
                  -H "Content-Type: application/json" \
                  --data-raw '{"repo":"${{ github.repository }}","commit":"${{ github.sha }}","branch":"${{ github.ref_name }}","actor":"${{ github.actor }}","event":"${{ github.event_name }}","run_id":"${{ github.run_id }}","CQA_PROJECT_TITLE":"${{ inputs.cqa_project_title }}","CQA_DEPLOYMENT_URL":"${{ inputs.cqa_deployment_url }}","CQA_AGENT_ID":"${{ inputs.cqa_agent_id }}","CQA_ACCEPTANCE_RATE":"${{ inputs.cqa_acceptance_rate }}","CQA_MAX_STEPS":"${{ inputs.cqa_max_steps }}","CQA_TIMEOUT":"${{ inputs.cqa_timeout }}","CQA_TEST_FOCUS":"${{ inputs.cqa_test_focus }}","CQA_EMAIL":"${{ inputs.cqa_email }}"}')

          echo "📡 ContextQA Response: $RESPONSE"

          # Extract deployment ID from response
          DEPLOYMENT_ID=$(echo $RESPONSE | jq -r '.data.deployment.id')
          if [ "$DEPLOYMENT_ID" = "null" ] || [ -z "$DEPLOYMENT_ID" ]; then
            echo "❌ Failed to extract deployment ID from response"
            exit 1
          fi

          # Extract knowledge base and test case IDs
          KNOWLEDGE_BASE_ID=$(echo $RESPONSE | jq -r '.data.testingConfig.knowledgeBaseId')
          TEST_CASE_ID=$(echo $RESPONSE | jq -r '.data.testingConfig.testCaseId')

          echo "🎯 Deployment ID: $DEPLOYMENT_ID"
          echo "🧠 Knowledge Base ID: $KNOWLEDGE_BASE_ID"
          echo "🧪 Test Case ID: $TEST_CASE_ID"

          # Store IDs for next steps
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV
          echo "KNOWLEDGE_BASE_ID=$KNOWLEDGE_BASE_ID" >> $GITHUB_ENV
          echo "TEST_CASE_ID=$TEST_CASE_ID" >> $GITHUB_ENV

          # Check if workflow started successfully
          if echo "$RESPONSE" | jq -e '.ok == true' > /dev/null; then
            echo "✅ ContextQA testing workflow started successfully"
            echo "📋 Project: $(echo $RESPONSE | jq -r '.data.testingConfig.projectTitle')"
            echo "🤖 Agent ID: $(echo $RESPONSE | jq -r '.data.testingConfig.agentId')"
            echo "🔗 Deployment URL: $(echo $RESPONSE | jq -r '.data.creationDetails.deploymentUrl')"
            echo "🎯 Test Focus: $(echo $RESPONSE | jq -r '.data.creationDetails.testFocus')"
          else
            echo "❌ Failed to start ContextQA testing workflow"
            echo "Error: $(echo $RESPONSE | jq -r '.error // "Unknown error"')"
            exit 1
          fi

      - name: Monitor Test Progress
        env:
          FLOW_URL: ${{ inputs.cqa_api_url }}
        run: |
          echo "⏳ Monitoring ContextQA test progress..."

          # Poll status every 30 seconds for up to 10 minutes (within 15 min timeout)
          MAX_ATTEMPTS=20
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "📊 Checking status (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            
            # Get workflow status using the GitHub Actions specific endpoint (no auth required)
            STATUS_RESPONSE=$(curl --fail -sS "$FLOW_URL/github/workflow-status/$DEPLOYMENT_ID")
            
            # Extract status and message
            WORKFLOW_STATUS=$(echo $STATUS_RESPONSE | jq -r '.status.status')
            STATUS_MESSAGE=$(echo $STATUS_RESPONSE | jq -r '.message // "No message"')
            
            echo "🔄 Status: $WORKFLOW_STATUS - $STATUS_MESSAGE"
            
            case "$WORKFLOW_STATUS" in
              "completed")
                echo "✅ ContextQA tests completed successfully!"
                echo "🎉 All automated tests have passed"
                break
                ;;
              "failed")
                echo "❌ ContextQA tests failed!"
                echo "🔍 Check the detailed report for failure details"
                exit 1
                ;;
              "queued"|"running")
                echo "⏳ Tests still in progress... waiting 30 seconds"
                sleep 30
                ;;
              *)
                echo "⚠️ Unknown status: $WORKFLOW_STATUS"
                sleep 30
                ;;
            esac
          done

          if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
            echo "⏰ Timeout waiting for tests to complete (10 minutes)"
            echo "🔄 Tests may still be running in the background"
            echo "📧 Check your email for final results (if email is configured)"
            exit 1
          fi

      - name: Get Final Results
        env:
          FLOW_URL: ${{ inputs.cqa_api_url }}
        if: always()
        run: |
          echo "📋 Getting final test results..."

          # Get final status with error handling
          if ! FINAL_STATUS=$(curl --fail -sS "$FLOW_URL/github/workflow-status/$DEPLOYMENT_ID" 2>&1); then
            echo "❌ Failed to get final status: $FINAL_STATUS"
            echo "⚠️ Proceeding with available information"
            exit 0  # Don't fail the workflow, just continue
          fi

          # Extract relevant information with better error handling
          PROJECT_TITLE=$(echo "$FINAL_STATUS" | jq -r '.status.testingConfig.projectTitle // "Unknown"')
          REPOSITORY=$(echo "$FINAL_STATUS" | jq -r '.status.repository.full_name // "Unknown"')
          EXECUTION_ID=$(echo "$FINAL_STATUS" | jq -r '.status.executionId // "N/A"')
          CREATED_AT=$(echo "$FINAL_STATUS" | jq -r '.status.createdAt // "Unknown"')

          echo "🎯 Project: $PROJECT_TITLE"
          echo "📁 Repository: $REPOSITORY"
          echo "🆔 Execution ID: $EXECUTION_ID"
          echo "⏰ Started: $CREATED_AT"
          echo "🧠 Knowledge Base ID: $KNOWLEDGE_BASE_ID"
          echo "🧪 Test Case ID: $TEST_CASE_ID"

          # Check completion status
          COMPLETION_STATUS=$(echo "$FINAL_STATUS" | jq -r '.status.status // "unknown"')
          echo "🔍 Final completion status: $COMPLETION_STATUS"

          if [ "$COMPLETION_STATUS" = "completed" ]; then
            echo "✅ ContextQA automated testing workflow completed successfully!"
            if [ "$(echo "$FINAL_STATUS" | jq -r '.status.testingConfig.email // "null"')" != "null" ]; then
              echo "📧 Test results have been sent to your email"
            else
              echo "📧 No email configured - check GitHub for results"
            fi
            echo "🔍 Check GitHub for detailed check run information"
            echo "🎉 Workflow completed successfully - exiting"
          else
            echo "⚠️ Test workflow did not complete successfully (status: $COMPLETION_STATUS)"
            if [ "$(echo "$FINAL_STATUS" | jq -r '.status.testingConfig.email // "null"')" != "null" ]; then
              echo "📧 Check your email for any error notifications"
            fi
            echo "🔍 Check server logs for more details"
          fi

          echo "🏁 Final Results step completed"

      - name: Show GitHub Check Run Info
        if: always()
        run: |
          echo "🔍 GitHub Check Run Information:"
          echo "📱 Check runs are automatically created and updated during testing"
          echo "👀 View progress in the GitHub Actions tab or repository checks"
          echo "📧 Final results are sent via email when tests complete"
          echo "🧠 Knowledge base and test case were created dynamically"
          echo "🔄 No stored configuration required - everything is created on-demand"
          echo ""
          echo "📊 Current mode: Real API Mode (static authentication)"
