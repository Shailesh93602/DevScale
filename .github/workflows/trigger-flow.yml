name: ContextQA Testing Workflow

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ContextQA Testing - Call the reusable workflow from same repo
  contextqa-testing:
    uses: ./.github/workflows/contextqa-workflow.yml
    with:
      cqa_api_url: ${{ vars.CQA_API_URL }}
      cqa_api_secret: ${{ vars.CQA_API_SECRET }}
      cqa_branch: ${{ github.ref_name }}
      cqa_project_title: ${{ vars.CQA_PROJECT_TITLE }}
      cqa_deployment_url: ${{ vars.CQA_DEPLOYMENT_URL }}
      cqa_agent_id: ${{ vars.CQA_AGENT_ID }}
      cqa_acceptance_rate: ${{ vars.CQA_ACCEPTANCE_RATE }}
      cqa_max_steps: ${{ vars.CQA_MAX_STEPS }}
      cqa_timeout: ${{ vars.CQA_TIMEOUT }}
      cqa_test_focus: ${{ vars.CQA_TEST_FOCUS }}
      cqa_email: ${{ vars.CQA_EMAIL }}
