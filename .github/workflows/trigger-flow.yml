name: ContextQA Testing Workflow

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  contextqa-testing:
    uses: ./.github/workflows/contextqa-workflow.yml
    with:
      cqa_api_url: ${{ vars.CQA_API_URL }}
      cqa_api_secret: ${{ vars.CQA_API_SECRET }}
      cqa_project_title: ${{ vars.CQA_PROJECT_TITLE }}
      cqa_deployment_url: ${{ vars.CQA_DEPLOYMENT_URL }}
