# Local dependencies for load testing EduScale's backend.
# Start these, point the backend at them, then run the k6 / socket scripts.
#
#   docker compose -f loadtest/docker-compose.yml up -d
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eduscale
      POSTGRES_PASSWORD: eduscale
      POSTGRES_DB: eduscale
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduscale"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
